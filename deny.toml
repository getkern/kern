# cargo-deny: licenses + advisories. Run `cargo deny check`.
[advisories]
yanked = "deny"

[licenses]
# Permissive set we accept in the dependency tree. `unused-allowed-license = "allow"` keeps
# the check quiet while the tree is tiny (these cover the common deps we'll pull in later).
allow = ["Apache-2.0", "MIT", "BSD-3-Clause", "Unicode-3.0"]
confidence-threshold = 0.9
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates are referenced by path; that's not a real wildcard dependency.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
