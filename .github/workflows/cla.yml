name: CLA

# Contributor License Agreement gate. Every external PR must sign CLA.md before it can be merged -
# this is what keeps the project's copyright ownership whole (so it can be dual-/relicensed later).
# Zero cost, no external service: signatures are stored in-repo (on a dedicated branch) by the bot,
# using the built-in GITHUB_TOKEN. Contributors sign by posting one comment on their PR.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write # store the signatures file on the cla-signatures branch
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Run on every PR event, and when someone posts the sign / recheck comment.
        if: >-
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/getkern/kern/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures' # dedicated storage branch - never touches protected main
          # The maintainer and bots never need to sign:
          allowlist: 'getkerndev,dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: >-
            Thanks for the contribution! Before we can merge, please read our
            [Contributor License Agreement](https://github.com/getkern/kern/blob/main/CLA.md)
            and sign it by posting **exactly** this comment on this PR:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
