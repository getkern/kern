name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: build + test (x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: test
        run: cargo test --all
        # HW/privilege-gated tests skip gracefully, so x86 CI stays green.

  audit:
    name: cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Install recent prebuilt binaries so tool versions match local dev: the
      # pinned cargo-deny-action@v1 shipped an old cargo-deny that rejected newer
      # deny.toml keys / SPDX ids (e.g. Unicode-3.0).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo-deny
        run: cargo deny check
      - name: cargo-audit
        run: cargo audit
